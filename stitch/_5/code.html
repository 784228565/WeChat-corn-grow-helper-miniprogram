<body class="bg-surface text-on-surface font-body min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
<!-- Decorative Background Texture/Illustration -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute inset-0 organic-texture mix-blend-multiply"></div>
<img alt="" class="absolute w-full h-full object-cover opacity-10 blur-sm" data-alt="Abstract, soft-focus illustration of a mature cornfield in the early morning light, using deep earthy greens and pale yellow tones, providing a subtle, organic backdrop" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDexHe6nnoUBWs9yyAP5oY-bZ4sd0pXbMqpVB3fCdnB6Go9OhwgOz8_ZE-6fdn60CWY3a4V6Q2APjUctXWN1Bag3YGnJW-DevIGv3DbMR--J9sXqsHxE8bmcgwcAlrIRf3Gv3FJSJ2m5ezFlgMgexqYhVFEfO2yIcf_LcgbYR0W1gTosAmoPuEHT5MK8hbiEmav4cUsxd4Uy4mg6nRwmm5yu95f_0ckXWlXgbgi57PjMYfnx3w9J_IGwAeP-kmgm4oPoHOHaU7YglXe"/>
<!-- Organic shapes -->
<div class="absolute top-[-10%] right-[-5%] w-[40vw] h-[40vw] bg-surface-container-low rounded-full mix-blend-multiply opacity-50 blur-3xl"></div>
<div class="absolute bottom-[-15%] left-[-10%] w-[50vw] h-[50vw] bg-surface-variant rounded-full mix-blend-multiply opacity-30 blur-3xl"></div>
</div>
<!-- Main Content Canvas -->
<main class="relative z-10 w-full max-w-2xl px-6 py-12 md:px-12 flex flex-col items-center text-center">
<!-- Brand / Identity -->
<div class="mb-12">
<div class="w-20 h-20 bg-surface-container-low rounded-lg shadow-[0_8px_32px_rgba(21,66,18,0.08)] flex items-center justify-center mx-auto mb-6 transform -rotate-3 transition-transform hover:rotate-0 duration-300">
<span class="material-symbols-outlined text-4xl text-primary" data-icon="agriculture" data-weight="fill" style="font-variation-settings: 'FILL' 1;">agriculture</span>
</div>
</div>
<!-- Typography Cluster -->
<div class="mb-16 space-y-4 max-w-lg">
<h1 class="font-headline text-5xl md:text-6xl font-extrabold text-primary tracking-tight leading-tight">
                Welcome, Farmer!
            </h1>
<p class="font-body text-xl md:text-2xl text-on-surface-variant leading-relaxed">
                Are you growing corn this season?
            </p>
</div>
<!-- Action Area (Bento-style layout for options) -->
<div class="w-full grid grid-cols-1 md:grid-cols-2 gap-6">
<!-- Primary Action: Yes -->
<button class="group relative overflow-hidden bg-gradient-to-br from-secondary to-secondary-fixed-dim rounded-lg p-8 shadow-[0_8px_32px_rgba(21,66,18,0.12)] transition-all hover:-translate-y-1 hover:shadow-[0_12px_48px_rgba(21,66,18,0.16)] flex flex-col items-center justify-center min-h-[200px]">
<div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
<div class="w-16 h-16 bg-white/20 backdrop-blur-md rounded-full flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-3xl text-on-secondary" data-icon="spa">spa</span>
</div>
<span class="font-headline text-2xl font-bold text-on-secondary tracking-wide">
                    Yes, Let's Grow!
                </span>
</button>
<!-- Secondary Action: No -->
<button class="group relative overflow-hidden bg-surface-container-low rounded-lg p-8 shadow-[0_8px_32px_rgba(21,66,18,0.04)] transition-all hover:-translate-y-1 hover:bg-surface-container-highest hover:shadow-[0_12px_48px_rgba(21,66,18,0.08)] flex flex-col items-center justify-center min-h-[200px]">
<div class="w-16 h-16 bg-surface-variant rounded-full flex items-center justify-center mb-4 group-hover:bg-surface-dim transition-colors">
<span class="material-symbols-outlined text-3xl text-primary" data-icon="block">block</span>
</div>
<span class="font-headline text-xl font-bold text-primary tracking-wide">
                    No, Not This Season
                </span>
</button>
</div>
<!-- Footer / Supportive -->
<div class="mt-16">
<p class="font-body text-sm text-outline flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[16px]" data-icon="info">info</span>
                You can always change this in your ledger settings later.
            </p>
</div>
</main>
