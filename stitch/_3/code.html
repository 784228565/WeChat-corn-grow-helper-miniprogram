<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Living Ledger - Farm Setup</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

                extend: {
                    "colors": {
                        "surface-container-low": "#f5f3ef",
                        "surface-dim": "#dbdad6",
                        "secondary-container": "#b6f48a",
                        "surface-variant": "#e4e2de",
                        "on-tertiary-fixed-variant": "#5e4200",
                        "on-tertiary-fixed": "#271900",
                        "primary-container": "#2d5a27",
                        "surface-tint": "#3b6934",
                        "tertiary": "#4c3500",
                        "surface-container-highest": "#e4e2de",
                        "on-surface-variant": "#42493e",
                        "on-primary": "#ffffff",
                        "on-primary-fixed": "#002201",
                        "inverse-surface": "#30312e",
                        "error-container": "#ffdad6",
                        "primary-fixed-dim": "#a1d494",
                        "on-tertiary-container": "#f3b942",
                        "surface-container-lowest": "#ffffff",
                        "error": "#ba1a1a",
                        "inverse-primary": "#a1d494",
                        "on-surface": "#1b1c1a",
                        "outline-variant": "#c2c9bb",
                        "on-primary-fixed-variant": "#23501e",
                        "surface": "#fbf9f5",
                        "outline": "#72796e",
                        "on-tertiary": "#ffffff",
                        "tertiary-container": "#694a00",
                        "surface-container": "#efeeea",
                        "inverse-on-surface": "#f2f0ed",
                        "tertiary-fixed": "#ffdea7",
                        "primary-fixed": "#bcf0ae",

                        "secondary-fixed-dim": "#9bd771",
                        "surface-container-high": "#eae8e4",
                        "surface-bright": "#fbf9f5",
                        "secondary": "#376b10",
                        "on-primary-container": "#9dd090",

                        "on-secondary-fixed-variant": "#245100",
                        "on-background": "#1b1c1a",

                        "on-error-container": "#93000a"
                    },
                    "borderRadius": {
                        "DEFAULT": "1rem",
                        "lg": "2rem",
                        "xl": "3rem",
                        "full": "9999px"
                    },
                    "spacing": {},
                    "fontFamily": {
                        "headline": ["Plus Jakarta Sans"],
                        "body": ["Work Sans"],
                        "label": ["Work Sans"]
                    }
                },
            },
        }

<style>
        /* Custom styles to hide native scrollbar for a cleaner mobile app feel */
        ::-webkit-scrollbar {
            width: 0px;
            background: transparent;
        }
        body {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body antialiased selection:bg-secondary-container selection:text-on-secondary-container relative min-h-screen">
<!-- Main Content Canvas -->
<main class="w-full max-w-lg mx-auto pt-12 px-6 pb-40">
<!-- Editorial Header Section -->
<header class="mb-10 relative z-10">
<!-- Decorative Image -->
<div class="w-full h-32 rounded-lg overflow-hidden mb-8 shadow-[0_8px_32px_rgba(21,66,18,0.08)] bg-surface-container-high">
<img alt="Sprouting seedling" class="w-full h-full object-cover" data-alt="close up of rich dark soil and small green seedling sprouting in a sunlit agricultural field at dawn" src="https://lh3.googleusercontent.com/aida-public/AB6AXuCbUuTNJo7MYLlDFZHMWkHXNWxa818ghEEdvUGFvuINYClebx_Dcm8TCpluHhrYCeFc3C6AOJsUHP0ixyZPIpvL8vxhy87-vSC-gmJipBoWpb2X30zJ6cvWIL6Ta358P3bsVYgmBNxfMFXwiyRcN4mO63bocZWk37BWTc-VsK5g2npThRnZm291ghPLcj-ef1uad-JxWkE0yewxN5IYNioGD1ZW-ORmBzHF4xg01cUm3iluQcticBR3v8M0lH0eppreg6_1-mWZtEMj"/>
</div>
<h1 class="font-headline text-4xl font-extrabold text-primary leading-tight tracking-tight">
                Tell Us About<br/>Your Farm
            </h1>
<p class="text-on-surface-variant text-lg mt-4 max-w-[85%]">
                Let's establish your baseline to tailor insights for your specific crop conditions.
            </p>
</header>
<!-- Profile Setup Form -->
<form class="flex flex-col gap-8 relative z-10">
<!-- Full Name Input -->
<div class="flex flex-col gap-3 group">
<label class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-widest ml-1">Full Name</label>
<input class="w-full bg-surface-container-low rounded border-none px-5 py-4 text-lg text-on-surface placeholder:text-outline-variant focus:ring-0 shadow-[0_0_0_0_theme(colors.secondary)] focus:shadow-[0_2px_0_0_theme(colors.secondary)] transition-shadow duration-300" placeholder="e.g. Jane Doe" type="text"/>
</div>
<!-- Phone Number Input -->
<div class="flex flex-col gap-3 group">
<label class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-widest ml-1">Phone Number</label>
<input class="w-full bg-surface-container-low rounded border-none px-5 py-4 text-lg text-on-surface placeholder:text-outline-variant focus:ring-0 shadow-[0_0_0_0_theme(colors.secondary)] focus:shadow-[0_2px_0_0_theme(colors.secondary)] transition-shadow duration-300" placeholder="(555) 000-0000" type="tel"/>
</div>
<!-- Farm Location Input with Icon -->
<div class="flex flex-col gap-3 group">
<label class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-widest ml-1">Farm Location</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-5 top-1/2 -translate-y-1/2 text-primary" data-icon="location_on">location_on</span>
<input class="w-full bg-surface-container-low rounded border-none pl-14 pr-5 py-4 text-lg text-on-surface placeholder:text-outline-variant focus:ring-0 shadow-[0_0_0_0_theme(colors.secondary)] focus:shadow-[0_2px_0_0_theme(colors.secondary)] transition-shadow duration-300" placeholder="City, State or Zip" type="text"/>
</div>
</div>
<!-- Planting Density -->
<div class="flex flex-col gap-3 group">
<label class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-widest ml-1">Planting Density</label>
<div class="relative flex items-center bg-surface-container-low rounded transition-shadow duration-300 focus-within:shadow-[0_2px_0_0_theme(colors.secondary)]">
<input class="w-full bg-transparent border-none pl-5 pr-2 py-4 text-lg text-on-surface placeholder:text-outline-variant focus:ring-0" placeholder="32,000" type="number"/>
<span class="pr-5 text-on-surface-variant text-sm font-semibold whitespace-nowrap">plants/acre</span>
</div>
</div>
<!-- Seed Variety Dropdown -->
<div class="flex flex-col gap-3 group">
<label class="font-label text-xs font-bold text-on-surface-variant uppercase tracking-widest ml-1">Seed Variety</label>
<div class="relative">
<select class="w-full appearance-none bg-surface-container-low rounded border-none px-5 py-4 text-lg text-on-surface focus:ring-0 shadow-[0_0_0_0_theme(colors.secondary)] focus:shadow-[0_2px_0_0_theme(colors.secondary)] transition-shadow duration-300 cursor-pointer">
<option class="text-outline-variant" disabled="" selected="" value="">Select main variety...</option>
<option value="dkc-65-95">DKC 65-95 (Dekalb)</option>
<option value="p1197">P1197 (Pioneer)</option>
<option value="nk1082">NK1082 (Syngenta)</option>
<option value="other">Other / Mixed</option>
</select>
<span class="material-symbols-outlined absolute right-5 top-1/2 -translate-y-1/2 text-outline pointer-events-none" data-icon="expand_more">expand_more</span>
</div>
</div>
<!-- Primary Action Button -->
<div class="mt-8 pt-4">
<button class="w-full bg-gradient-to-r from-secondary to-secondary-fixed-dim text-on-secondary rounded py-5 px-6 font-headline font-bold text-lg shadow-[0_8px_32px_rgba(55,107,16,0.15)] hover:shadow-[0_12px_40px_rgba(55,107,16,0.25)] transition-all duration-300 active:scale-95 flex items-center justify-center gap-2" type="button">
                    Complete Setup
                    <span class="material-symbols-outlined" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</form>
</main>
<!-- BottomNavBar (Shared Component) 
         Note: As per Semantic Shell mandate, navigation is typically suppressed on onboarding/setup flows. 
         However, it is included here to fulfill the specific prompt request, with all items set to inactive 
         to prevent hallucinating an active state not present in the JSON. -->
<nav class="fixed bottom-8 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-50 flex justify-around items-center p-2 bg-white/70 dark:bg-stone-900/70 backdrop-blur-xl shadow-[0_8px_32px_rgba(21,66,18,0.08)] rounded-full">
<button class="flex flex-col items-center justify-center text-[#154212]/60 dark:text-stone-400 px-6 py-2 hover:bg-[#2D5A27]/10 dark:hover:bg-white/5 transition-colors active:scale-90 transition-transform duration-300 rounded-full group">
<span class="material-symbols-outlined mb-1 group-hover:text-primary transition-colors" data-icon="agriculture">agriculture</span>
<span class="font-['Work_Sans'] text-[10px] font-bold uppercase tracking-widest group-hover:text-primary transition-colors">Check-in</span>
</button>
<button class="flex flex-col items-center justify-center text-[#154212]/60 dark:text-stone-400 px-6 py-2 hover:bg-[#2D5A27]/10 dark:hover:bg-white/5 transition-colors active:scale-90 transition-transform duration-300 rounded-full group">
<span class="material-symbols-outlined mb-1 group-hover:text-primary transition-colors" data-icon="history">history</span>
<span class="font-['Work_Sans'] text-[10px] font-bold uppercase tracking-widest group-hover:text-primary transition-colors">Logs</span>
</button>
<button class="flex flex-col items-center justify-center text-[#154212]/60 dark:text-stone-400 px-6 py-2 hover:bg-[#2D5A27]/10 dark:hover:bg-white/5 transition-colors active:scale-90 transition-transform duration-300 rounded-full group">
<span class="material-symbols-outlined mb-1 group-hover:text-primary transition-colors" data-icon="smart_toy">smart_toy</span>
<span class="font-['Work_Sans'] text-[10px] font-bold uppercase tracking-widest group-hover:text-primary transition-colors">AI Assistant</span>
</button>
</nav>
</body></html>
