<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>欢迎页</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #fbf9f5;
  display: flex;
  justify-content: center;
  padding: 20px;
}
.phone {
  width: 390px;
  height: 844px;
  background: #fbf9f5;
  border-radius: 40px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.15);
  overflow: hidden;
  position: relative;
}
.container {
  min-height: 100%;
  background-color: #fbf9f5;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 24px;
  position: relative;
  overflow: hidden;
}
.bg-decoration {
  position: absolute;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}
.blur-circle {
  position: absolute;
  border-radius: 50%;
  filter: blur(40px);
}
.blur-circle-1 {
  width: 200px; height: 200px;
  background-color: #f5f3ef;
  top: -10%; right: -5%;
  opacity: 0.5;
}
.blur-circle-2 {
  width: 250px; height: 250px;
  background-color: #e4e2de;
  bottom: -15%; left: -10%;
  opacity: 0.3;
}
.content {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 320px;
  display: flex;
  flex-direction: column;
  align-items: center;
}
.brand-icon-wrapper { margin-bottom: 36px; }
.brand-icon {
  width: 80px; height: 80px;
  background-color: #f5f3ef;
  border-radius: 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 36px;
  box-shadow: 0 4px 16px rgba(21,66,18,0.08);
  transform: rotate(-3deg);
}
.title-section {
  text-align: center;
  margin-bottom: 60px;
}
.headline {
  display: block;
  font-size: 36px;
  font-weight: 800;
  color: #154212;
  line-height: 1.1;
  letter-spacing: -1px;
  margin-bottom: 16px;
}
.subtitle {
  display: block;
  font-size: 18px;
  color: #42493e;
  line-height: 1.5;
}
.action-area {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 16px;
}
.btn-yes {
  background: linear-gradient(135deg, #376B10, #9bd771);
  border-radius: 16px;
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 140px;
  box-shadow: 0 4px 16px rgba(21,66,18,0.12);
  cursor: pointer;
}
.btn-yes-icon {
  width: 64px; height: 64px;
  background: rgba(255,255,255,0.2);
  backdrop-filter: blur(5px);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 16px;
}
.btn-yes-text {
  font-size: 20px;
  font-weight: 700;
  color: #fff;
  letter-spacing: 1px;
}
.btn-no {
  background-color: #f5f3ef;
  border-radius: 16px;
  padding: 32px 24px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 140px;
  box-shadow: 0 4px 16px rgba(21,66,18,0.04);
  cursor: pointer;
}
.btn-no-icon {
  width: 64px; height: 64px;
  background-color: #e4e2de;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 28px;
  margin-bottom: 16px;
}
.btn-no-text {
  font-size: 18px;
  font-weight: 700;
  color: #154212;
  letter-spacing: 1px;
}
.footer {
  margin-top: 48px;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.footer-text {
  font-size: 12px;
  color: #72796e;
}
</style>
</head>
<body>
<div class="phone">
  <div class="container">
    <div class="bg-decoration">
      <div class="blur-circle blur-circle-1"></div>
      <div class="blur-circle blur-circle-2"></div>
    </div>
    <div class="content">
      <div class="brand-icon-wrapper">
        <div class="brand-icon">🚜</div>
      </div>
      <div class="title-section">
        <span class="headline">欢迎，<br>农户！</span>
        <span class="subtitle">本季种植玉米吗？</span>
      </div>
      <div class="action-area">
        <div class="btn-yes">
          <div class="btn-yes-icon">🌱</div>
          <span class="btn-yes-text">是的，开始种植</span>
        </div>
        <div class="btn-no">
          <div class="btn-no-icon">🚫</div>
          <span class="btn-no-text">不是，本季不种</span>
        </div>
      </div>
      <div class="footer">
        <span class="footer-text">ℹ️ 稍后可以在设置中修改。</span>
      </div>
    </div>
  </div>
</div>
</body>
</html>
