<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>农场切换菜单</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fbf9f5;display:flex;justify-content:center;padding:20px}
.phone{width:390px;height:844px;background:#fbf9f5;border-radius:40px;box-shadow:0 20px 60px rgba(0,0,0,0.15);overflow:hidden;position:relative}
.container{min-height:100%;background:#fbf9f5;padding-bottom:100px;position:relative}
.app-bar{display:flex;justify-content:space-between;align-items:center;padding:24px 16px 12px;background:#fbf9f5;position:sticky;top:0;z-index:70}
.app-bar-left{display:flex;align-items:center;gap:12px}
.avatar{width:40px;height:40px;border-radius:50%;background:#eae8e4;display:flex;align-items:center;justify-content:center;font-size:20px}
.app-title{font-size:16px;font-weight:900;color:#154212;letter-spacing:1px}
.app-bar-right{width:40px;height:40px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(21,66,18,0.04);font-size:18px}
.content{padding:16px}
.page-header{margin-bottom:24px}
.page-title-group{margin-bottom:16px;padding-left:8px}
.page-title{display:block;font-size:28px;font-weight:700;color:#154212;line-height:1.15;margin-bottom:6px}
/* Farm Menu Dropdown */
.farm-menu{position:absolute;top:70px;left:16px;width:280px;background:#fff;border-radius:16px;box-shadow:0 8px 32px rgba(21,66,18,0.12);padding:16px;z-index:60}
.farm-menu-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid rgba(219,218,214,0.3)}
.farm-menu-title{font-size:14px;font-weight:700;color:#154212;text-transform:uppercase;letter-spacing:1px}
.farm-menu-close{font-size:14px;color:#72796e;padding:4px 8px}
.farm-list{display:flex;flex-direction:column;gap:4px}
.farm-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;transition:background-color 0.2s}
.farm-item-active{background:#bcf0ae}
.farm-icon{font-size:20px}
.farm-info{flex:1;display:flex;flex-direction:column}
.farm-name{font-size:14px;font-weight:600;color:#1b1c1a}
.farm-location{font-size:11px;color:#42493e;margin-top:2px}
.farm-check{font-size:14px;color:#376B10;font-weight:700}
.farm-add{display:flex;align-items:center;justify-content:center;gap:6px;margin-top:12px;padding:12px;border-radius:10px;border:2px dashed #c2c9bb;background:#f5f3ef}
.farm-add-icon{font-size:16px;color:#376B10;font-weight:700}
.farm-add-text{font-size:14px;font-weight:600;color:#154212}
/* Menu Overlay */
.menu-overlay{position:fixed;inset:0;background:rgba(27,28,26,0.2);z-index:50}
.bottom-nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);width:90%;max-width:320px;border-radius:9999px;display:flex;justify-content:space-around;align-items:center;padding:8px;box-shadow:0 4px 16px rgba(21,66,18,0.08);z-index:50;background:rgba(255,255,255,0.7);backdrop-filter:blur(20px)}
.nav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 16px;border-radius:9999px}
.nav-item:first-child{background:#2d5a27}
.nav-icon{font-size:20px;margin-bottom:4px}
.nav-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#154212}
.nav-item:first-child .nav-label{color:#b6f48a}
</style>
</head>
<body>
<div class="phone">
<div class="container">
<div class="app-bar">
<div class="app-bar-left"><div class="avatar">👤</div><span class="app-title">农田管家</span></div>
<div class="app-bar-right">🔔</div>
</div>
<div class="menu-overlay"></div>
<div class="farm-menu">
<div class="farm-menu-header">
<span class="farm-menu-title">您的农场</span>
<span class="farm-menu-close">✕</span>
</div>
<div class="farm-list">
<div class="farm-item farm-item-active">
<span class="farm-icon">🌽</span>
<div class="farm-info">
<span class="farm-name">张三的农场</span>
<span class="farm-location">内蒙古通辽市科尔沁区</span>
</div>
<span class="farm-check">✓</span>
</div>
<div class="farm-item">
<span class="farm-icon">🌾</span>
<div class="farm-info">
<span class="farm-name">李四的地块</span>
<span class="farm-location">内蒙古赤峰市松山区</span>
</div>
</div>
</div>
<div class="farm-add">
<span class="farm-add-icon">+</span>
<span class="farm-add-text">添加新农场</span>
</div>
</div>
<div class="content">
<div class="page-header">
<div class="page-title-group"><span class="page-title">当前作物：甜玉米</span></div>
</div>
</div>
<div class="bottom-nav">
<div class="nav-item"><span class="nav-icon">🚜</span><span class="nav-label">打卡</span></div>
<div class="nav-item"><span class="nav-icon">⏱</span><span class="nav-label">记录</span></div>
<div class="nav-item"><span class="nav-icon">🤖</span><span class="nav-label">AI助手</span></div>
</div>
</div>
</div>
</body>
</html>
