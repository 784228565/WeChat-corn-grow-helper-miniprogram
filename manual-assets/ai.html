<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=390, initial-scale=1.0">
<title>AI助手页</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#fbf9f5;display:flex;justify-content:center;padding:20px}
.phone{width:390px;height:844px;background:#fbf9f5;border-radius:40px;box-shadow:0 20px 60px rgba(0,0,0,0.15);overflow:hidden;position:relative}
.container{min-height:100%;background:#fbf9f5;display:flex;flex-direction:column;padding-bottom:200px}
.app-bar{display:flex;justify-content:space-between;align-items:center;padding:24px 16px 12px;background:#fbf9f5;position:sticky;top:0;z-index:40}
.app-bar-left{display:flex;align-items:center;gap:12px}
.avatar{width:40px;height:40px;border-radius:50%;background:#eae8e4;display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px rgba(21,66,18,0.04)}
.app-title{font-size:16px;font-weight:900;color:#154212;letter-spacing:1px}
.app-bar-right{width:48px;height:48px;border-radius:50%;background:#fff;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(21,66,18,0.04);font-size:20px}
.content{flex:1;padding:16px;overflow-y:auto}
.page-header{margin-bottom:24px;padding-left:8px}
.page-title{display:block;font-size:28px;font-weight:800;color:#154212;line-height:1.15;margin-bottom:8px}
.page-subtitle{display:block;font-size:15px;color:#42493e;max-width:80%}
.chat-area{display:flex;flex-direction:column;gap:24px;padding:0 8px}
.message{display:flex;gap:12px}
.ai-message{margin-right:48px}
.user-message{margin-left:48px;justify-content:flex-end}
.ai-avatar{width:40px;height:40px;border-radius:50%;background:#2d5a27;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:4px;box-shadow:0 4px 16px rgba(21,66,18,0.08);font-size:18px}
.user-avatar{width:40px;height:40px;border-radius:50%;background:#eae8e4;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:4px;box-shadow:0 4px 16px rgba(21,66,18,0.04);font-size:18px}
.message-bubble{padding:16px 20px;max-width:100%}
.ai-bubble{background:#2d5a27;border-radius:16px;border-top-left-radius:4px;box-shadow:0 4px 16px rgba(21,66,18,0.06)}
.user-bubble{background:#fff;border-radius:16px;border-top-right-radius:4px;box-shadow:0 4px 16px rgba(21,66,18,0.04)}
.message-text{font-size:15px;line-height:1.6}
.ai-text{color:#fff}
.user-text{color:#1b1c1a}
.message-chips{display:flex;gap:8px;margin-top:12px;flex-wrap:wrap}
.chip{display:inline-flex;align-items:center;padding:6px 12px;border-radius:9999px}
.chip-primary{background:#bcf0ae}
.chip-text{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#154212}
.input-area{position:fixed;bottom:160px;left:0;right:0;padding:0 16px;z-index:30}
.suggestions{display:flex;gap:12px;min-width:max-content;padding-bottom:8px;overflow-x:auto}
.suggestion-chip{display:flex;align-items:center;gap:6px;background:#fff;border-radius:9999px;padding:10px 16px;box-shadow:0 4px 16px rgba(21,66,18,0.05);border:1px solid rgba(194,201,187,0.15);flex-shrink:0}
.suggestion-text{font-size:13px;font-weight:700;color:#154212}
.input-box{display:flex;align-items:center;gap:8px;background:#fff;border-radius:12px;padding:8px 12px;box-shadow:0 12px 48px rgba(21,66,18,0.08)}
.mic-icon{font-size:18px;padding:8px;color:#42493e}
.chat-input{flex:1;font-size:15px;color:#1b1c1a;background:transparent;border:none;outline:none}
.send-btn{width:40px;height:40px;background:linear-gradient(135deg,#376B10,#9bd771);border-radius:8px;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(55,107,16,0.2);flex-shrink:0}
.send-icon{font-size:16px;color:#fff}
.bottom-nav{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);width:90%;max-width:320px;border-radius:9999px;display:flex;justify-content:space-around;align-items:center;padding:8px;box-shadow:0 4px 16px rgba(21,66,18,0.08);z-index:50;background:rgba(255,255,255,0.7);backdrop-filter:blur(20px)}
.nav-item{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 16px;border-radius:9999px;opacity:0.6}
.nav-item:nth-child(3){background:#2d5a27;opacity:1}
.nav-icon{font-size:20px;margin-bottom:4px}
.nav-label{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:#154212}
.nav-item:nth-child(3) .nav-label{color:#b6f48a}
.loading-indicator{text-align:center;padding:16px;color:#42493e;font-size:14px}
</style>
</head>
<body>
<div class="phone">
<div class="container">
<div class="app-bar">
<div class="app-bar-left"><div class="avatar">👤</div><span class="app-title">农田管家</span></div>
<div class="app-bar-right">🔔</div>
</div>
<div class="content">
<div class="page-header">
<span class="page-title">AI 农事助手</span>
<span class="page-subtitle">咨询作物健康、天气趋势或病虫害识别。</span>
</div>
<div class="chat-area">
<div class="message ai-message">
<div class="ai-avatar">🤖</div>
<div class="message-bubble ai-bubble">
<div class="message-text ai-text">早上好！我是您的 AI 农事助手。请问关于 V6 阶段玉米的作物健康、天气趋势或病虫害识别方面的问题。</div>
<div class="message-chips"><div class="chip chip-primary"><span class="chip-text">V6 阶段</span></div></div>
</div>
</div>
<div class="message user-message">
<div class="message-bubble user-bubble">
<div class="message-text user-text">玉米叶子发黄是怎么回事？</div>
</div>
<div class="user-avatar">👤</div>
</div>
<div class="message ai-message">
<div class="ai-avatar">🤖</div>
<div class="message-bubble ai-bubble">
<div class="message-text ai-text">玉米叶子发黄可能有以下几种原因：<br><br>1. <b>缺氮</b>：老叶先黄，从叶尖向叶基部发展<br>2. <b>缺水</b>：叶片萎蔫后变黄<br>3. <b>病虫害</b>：检查是否有蚜虫或玉米螟<br>4. <b>积涝</b>：根部缺氧导致叶片发黄<br><br>建议您先检查土壤湿度和是否有虫害，必要时追肥或排水。</div>
</div>
</div>
</div>
</div>
<div class="input-area">
<div class="suggestions">
<div class="suggestion-chip"><span>🌡️</span><span class="suggestion-text">本周天气怎么样</span></div>
<div class="suggestion-chip"><span>🐛</span><span class="suggestion-text">怎么防治玉米螟</span></div>
<div class="suggestion-chip"><span>💧</span><span class="suggestion-text">什么时候浇水</span></div>
</div>
<div class="input-box">
<span class="mic-icon">🎤</span>
<input class="chat-input" placeholder="输入您的问题..." value="">
<div class="send-btn"><span class="send-icon">➤</span></div>
</div>
</div>
<div class="bottom-nav">
<div class="nav-item"><span class="nav-icon">🚜</span><span class="nav-label">打卡</span></div>
<div class="nav-item"><span class="nav-icon">⏱</span><span class="nav-label">记录</span></div>
<div class="nav-item"><span class="nav-icon">🤖</span><span class="nav-label">AI助手</span></div>
</div>
</div>
</div>
</body>
</html>
